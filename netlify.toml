[build]
  publish = "."
  functions = "netlify/functions"

# Agenda import tool (kept as-is)
[[redirects]]
  from = "/importagenda"
  to   = "/importagenda.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# CSS/JS keep the same filename across deploys, so revalidate rather
# than cache immutably (avoids stale HTML/CSS mismatches). Bump the
# ?v= query in the HTML when you want to force an immediate refresh.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
